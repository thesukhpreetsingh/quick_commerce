services:
  postgres-db:
    image: postgres:15-alpine
    container_name: marketplace-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: marketplace-backend
    restart: always
    ports:
      - "5000:5000"
    # environment:
      # DB_HOST: postgres-db
      # DB_USER: user
      # DB_PASSWORD: password
      # DB_NAME: marketplace
      # DB_PORT: 5432
      # PORT: 5000
      # REDIS_HOST: redis
      # REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_started
    # For containerized runs use the image contents; remove the bind mount
    # volumes:
    #   - ./apps/backend:/app

  order-service:
    build:
      context: .
      dockerfile: ./apps/order-service/Dockerfile
    container_name: marketplace-order-service
    restart: always
    ports:
      - "6001:6000"
    environment:
      DB_HOST: postgres-db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: marketplace
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INVENTORY_SERVICE_GRPC_URL: inventory-service:7001
      INVENTORY_GRPC_URL: inventory-service:7001
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_started

  payment-service:
    build:
      context: ./apps/payment-service
      dockerfile: Dockerfile
    container_name: marketplace-payment-service
    restart: always
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started

  inventory-service:
    build:
      context: .
      dockerfile: ./apps/inventory-service/Dockerfile
    container_name: marketplace-inventory-service
    restart: always
    ports:
      - "7000:7000"
      - "7001:7001"
    environment:
      DB_HOST: postgres-db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: marketplace
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: marketplace-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
      - order-service

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    container_name: marketplace-notification-service
    restart: "no"
    ports:
      - "6002:6002"
    depends_on:
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres-db


volumes:
  postgres_data:
  redis_data:
  bullmq_data: